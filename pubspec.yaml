# pubspec.yaml

name: lumora

description: "Lumora - Messages Through Time 💜"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STORAGE
  shared_preferences: ^2.2.3

  # NOTIFICATIONS
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # FIREBASE
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true